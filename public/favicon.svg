<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"></stop>
      <stop offset="100%" stop-color="#7C3AED"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#ffffff"></rect>

  <!-- Document -->
  <rect x="32" y="24" width="64" height="80" rx="10" fill="url(#grad)"></rect>
  <rect x="36" y="28" width="56" height="72" rx="8" fill="#ffffff"></rect>

  <!-- Text lines -->
  <line x1="44" y1="48" x2="84" y2="48" stroke="#6366F1" stroke-width="4" stroke-linecap="round"></line>
  <line x1="44" y1="60" x2="84" y2="60" stroke="#6366F1" stroke-width="4" stroke-linecap="round"></line>
  <line x1="44" y1="72" x2="70" y2="72" stroke="#A5B4FC" stroke-width="4" stroke-linecap="round"></line>

  <!-- Pencil -->
  <g transform="rotate(45 80 88)">
    <rect x="70" y="80" width="30" height="10" rx="4" fill="url(#grad)"></rect>
    <polygon points="100,80 108,85 100,90" fill="#6366F1"></polygon>
  </g>

  <!-- Users (collaboration hint) -->
  <circle cx="24" cy="56" r="8" fill="#3B82F6"></circle>
  <circle cx="24" cy="76" r="8" fill="#14B8A6"></circle>
  <circle cx="104" cy="64" r="8" fill="#F59E0B"></circle>

</svg>